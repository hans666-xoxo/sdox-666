<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANS666 • TOOLS SIMPLE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #111;
            border: 2px solid #00ff9d;
            border-radius: 15px;
            padding: 25px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #00ff9d;
            text-shadow: 0 0 15px #00ff9d;
        }
        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #666;
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .card {
            background: #1a1a1a;
            border: 2px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
        }
        .card h2 {
            color: #00ff9d;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px dashed #00ff9d;
            padding-bottom: 5px;
        }
        .btn {
            background: #1a1a1a;
            border: 2px solid #00ff9d;
            color: #00ff9d;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background: #00ff9d;
            color: #000;
        }
        .output {
            background: #000;
            border: 2px solid #00ff9d;
            border-radius: 5px;
            padding: 15px;
            margin: 15px 0;
            min-height: 100px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HANS666 • TOOLS</h1>
        <div class="subtitle">simple tools • no ribet • slebeww</div>

        <!-- RANDOM DATA GENERATOR -->
        <div class="card">
            <h2>🎲 RANDOM DATA GENERATOR</h2>
            <button class="btn" id="randomDataBtn">GENERATE</button>
            <div class="output" id="randomDataOutput">[ klik generate ]</div>
        </div>

        <!-- IP CHECKER -->
        <div class="card">
            <h2>🌐 IP CHECKER</h2>
            <button class="btn" id="ipCheckBtn">CEK IP SAYA</button>
            <div class="output" id="ipOutput">[ klik cek IP ]</div>
        </div>

        <!-- USERNAME CHECKER (FAKE) -->
        <div class="card">
            <h2>🔍 USERNAME CHECKER</h2>
            <input type="text" id="usernameInput" placeholder="masukkan username" style="width:100%; padding:10px; margin:10px 0; background:#000; border:2px solid #00ff9d; color:#00ff9d;">
            <button class="btn" id="usernameBtn">CEK USERNAME</button>
            <div class="output" id="usernameOutput">[ hasil akan muncul di sini ]</div>
        </div>

        <div class="footer">
            HANS666 • XOXO • 2026
        </div>
    </div>

    <script>
        // ==================== RANDOM DATA GENERATOR ====================
        document.getElementById('randomDataBtn').addEventListener('click', function() {
            const firstNames = ['Andi', 'Budi', 'Citra', 'Dian', 'Eka', 'Fajar', 'Gita', 'Hendra', 'Indah', 'Joko'];
            const lastNames = ['Pratama', 'Wijaya', 'Kusuma', 'Nugraha', 'Saputra', 'Hidayat', 'Utama', 'Santoso'];
            const cities = ['Jakarta', 'Surabaya', 'Bandung', 'Medan', 'Semarang', 'Makassar', 'Yogyakarta'];
            
            const firstName = firstNames[Math.floor(Math.random() * firstNames.length)];
            const lastName = lastNames[Math.floor(Math.random() * lastNames.length)];
            const age = Math.floor(Math.random() * 30) + 18;
            const city = cities[Math.floor(Math.random() * cities.length)];
            const phone = `08${Math.floor(Math.random() * 1000000000).toString().padStart(9, '0')}`;
            const email = `${firstName.toLowerCase()}${lastName.toLowerCase()}${Math.floor(Math.random()*100)}@gmail.com`;
            
            const output = `👤 Nama: ${firstName} ${lastName}
🎂 Umur: ${age} tahun
📱 HP: ${phone}
📧 Email: ${email}
📍 Kota: ${city}`;
            
            document.getElementById('randomDataOutput').textContent = output;
        });

        // ==================== IP CHECKER ====================
        document.getElementById('ipCheckBtn').addEventListener('click', async function() {
            document.getElementById('ipOutput').textContent = '⏳ Mendeteksi IP...';
            
            try {
                // Ambil IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const ip = ipData.ip;
                
                // Ambil lokasi
                const locRes = await fetch(`https://ipapi.co/${ip}/json/`);
                const locData = await locRes.json();
                
                const output = `🌐 IP: ${ip}
📍 Lokasi: ${locData.city || '-'}, ${locData.country_name || '-'}
🏢 ISP: ${locData.org || '-'}
📡 Kordinat: ${locData.latitude || '-'}, ${locData.longitude || '-'}`;
                
                document.getElementById('ipOutput').textContent = output;
            } catch (e) {
                document.getElementById('ipOutput').textContent = '❌ Gagal mendeteksi IP';
            }
        });

        // ==================== USERNAME CHECKER (FAKE) ====================
        document.getElementById('usernameBtn').addEventListener('click', function() {
            const username = document.getElementById('usernameInput').value.trim();
            
            if (!username) {
                document.getElementById('usernameOutput').textContent = '❌ Masukkan username dulu!';
                return;
            }
            
            document.getElementById('usernameOutput').textContent = '⏳ Mencari...';
            
            setTimeout(() => {
                // Data fake (tapi realistis)
                const platforms = [
                    { name: 'Instagram', found: Math.random() > 0.3 },
                    { name: 'Twitter', found: Math.random() > 0.4 },
                    { name: 'TikTok', found: Math.random() > 0.5 },
                    { name: 'Facebook', found: Math.random() > 0.6 },
                    { name: 'GitHub', found: Math.random() > 0.7 },
                    { name: 'Telegram', found: Math.random() > 0.8 }
                ];
                
                let output = `🔍 Hasil untuk @${username}\n━━━━━━━━━━━━━━━━━━\n`;
                
                platforms.forEach(p => {
                    output += p.found ? `✅ ${p.name}: @${username}\n` : `❌ ${p.name}: tidak ditemukan\n`;
                });
                
                output += `━━━━━━━━━━━━━━━━━━\n⚠️ Data ini hanya simulasi!`;
                
                document.getElementById('usernameOutput').textContent = output;
            }, 1500);
        });
    </script>
</body>
</html>
